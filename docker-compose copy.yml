
services:

  mariadb:
    image: mariadb:11.4
    container_name: vantus-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: express
      MYSQL_USER: admon
      MYSQL_PASSWORD: paimon
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./Back
    container_name: vantus-back
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/express
      SPRING_DATASOURCE_USERNAME: admon
      SPRING_DATASOURCE_PASSWORD: paimon
    depends_on:
      - mariadb

  frontend:
    build: ./Front
    container_name: vantus-front
    restart: always
    ports:
      - "4173:4173"
    env_file:
      - ./Front/.env
    depends_on:
      - backend

volumes:
  db_data:
